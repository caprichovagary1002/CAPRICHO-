name: capricho_vagary
description: "CAPRICHO VAGARY - A barber, fashion, and house-call booking platform with integrated messaging, payments, and order tracking."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Material Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  
  # State Management
  provider: ^6.0.0
  get: ^4.6.5
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.6.0
  
  # Payments
  stripe_flutter: ^10.0.0
  razorpay_flutter: ^1.3.8
  
  # Networking & HTTP
  http: ^1.1.0
  dio: ^5.3.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Image & Media Handling
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0
  
  # Messaging & Chat
  intl: ^0.19.0
  
  # Authentication & Security
  local_auth: ^2.1.0
  flutter_secure_storage: ^9.0.0
  
  # QR Code & Barcode
  qr_flutter: ^4.1.0
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.0.0
  geocoding: ^2.1.0
  
  # Notifications
  flutter_local_notifications: ^16.2.0
  
  # Date & Time
  table_calendar: ^3.0.9
  
  # Animations
  lottie: ^2.4.0
  
  # PDF Export
  pdf: ^3.10.4
  printing: ^5.11.0
  
  # Rating & Reviews
  flutter_rating_bar: ^4.0.1
  
  # Connectivity
  connectivity_plus: ^5.0.0
  
  # Device Info
  device_info_plus: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  
  # Build & Code Generation
  build_runner: ^2.4.6
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/logos/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
